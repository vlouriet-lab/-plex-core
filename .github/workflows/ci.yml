name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  ci:
    name: Тесты, clippy, fmt
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Установить системные зависимости сборки
        run: sudo apt-get update && sudo apt-get install -y libclang-dev perl

      - name: Установить Rust (stable + компоненты)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Кэш зависимостей
        uses: Swatinem/rust-cache@v2

      - name: Проверить форматирование
        run: cargo fmt --check

      - name: Проверить компиляцию
        run: cargo check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Тесты
        run: cargo test
